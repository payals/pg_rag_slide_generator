<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1600" height="900"
     viewBox="0 0 1600 900">
  <defs>
    <style>
      text { font-family: Arial, 'Segoe UI', Helvetica, sans-serif; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#0a0e27" rx="0"/>
  <text x="800.0" y="42" font-size="52" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="700">Before &amp; After: RAG Effect</text>
<line x1="800.0" y1="70" x2="800.0" y2="880" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>
<circle cx="800.0" cy="470.0" r="28" fill="#0a0e27"/>
<circle cx="800.0" cy="470.0" r="26" fill="#334155"/>
<text x="800.0" y="470.0" font-size="24" fill="#94a3b8" text-anchor="middle" dominant-baseline="middle" font-weight="700">VS</text>
<rect x="30" y="70" width="745.0" height="800" rx="8" fill="#111836" stroke="#ef4444" stroke-width="2" />
<text x="400.0" y="108" font-size="48" fill="#ef4444" text-anchor="middle" dominant-baseline="middle" font-weight="700">Without RAG</text>
<text x="400.0" y="342.5" font-size="36" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="normal">LLM uses training data only</text>
<text x="400.0" y="422.5" font-size="36" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="normal">Stale knowledge cutoff</text>
<text x="400.0" y="502.5" font-size="36" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="normal">No source citations</text>
<text x="400.0" y="582.5" font-size="36" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="normal">Hallucination risk HIGH</text>
<text x="400.0" y="662.5" font-size="36" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="normal">Generic responses</text>
<rect x="825.0" y="70" width="745.0" height="800" rx="8" fill="#111836" stroke="#22c55e" stroke-width="2" />
<text x="1200.0" y="108" font-size="48" fill="#22c55e" text-anchor="middle" dominant-baseline="middle" font-weight="700">With RAG</text>
<text x="1200.0" y="342.5" font-size="36" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="normal">LLM augmented with fresh docs</text>
<text x="1200.0" y="422.5" font-size="36" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="normal">Real-time knowledge retrieval</text>
<text x="1200.0" y="502.5" font-size="36" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="normal">Every claim cited to source</text>
<text x="1200.0" y="582.5" font-size="36" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="normal">Hallucination risk LOW</text>
<text x="1200.0" y="662.5" font-size="36" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="normal">Domain-specific accuracy</text>
