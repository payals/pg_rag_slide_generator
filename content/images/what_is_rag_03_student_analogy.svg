<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1600" height="900"
     viewBox="0 0 1600 900">
  <defs>
    <style>text { font-family: Arial, 'Segoe UI', Helvetica, sans-serif; }</style>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ef4444" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="redAtmos" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0a0e27" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenAtmos" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0a0e27" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dividerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#0a0e27"/>
  <text x="800" y="42" font-size="48" fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle" font-weight="700">RAG: The Student Analogy</text>

  <!-- ====== LEFT SIDE: Without RAG ====== -->
  <rect x="0" y="65" width="790" height="835" fill="url(#redAtmos)"/>
  <text x="390" y="98" font-size="36" fill="#ef4444" text-anchor="middle" dominant-baseline="middle" font-weight="700">Without RAG</text>

  <!-- Left student figure (slouched, confused) -->
  <!-- Head (tilted slightly) -->
  <circle cx="350" cy="200" r="32" fill="#334155" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- Eyes (worried) -->
  <circle cx="340" cy="195" r="3" fill="#94a3b8"/>
  <circle cx="362" cy="195" r="3" fill="#94a3b8"/>
  <!-- Worried mouth -->
  <path d="M 340,212 Q 351,206 362,212" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <!-- Sweat drop -->
  <ellipse cx="380" cy="188" rx="3" ry="5" fill="#06b6d4" opacity="0.4"/>

  <!-- Body (slouched torso) -->
  <path d="M 320,232 Q 318,260 310,310 L 310,360 L 390,360 L 390,310 Q 382,260 380,232" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
  <!-- Arms on desk (drooping) -->
  <path d="M 310,300 Q 280,330 240,355" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M 390,300 Q 420,330 460,355" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>

  <!-- Desk -->
  <rect x="170" y="358" width="390" height="12" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="190" y="370" width="6" height="55" fill="#1e293b"/>
  <rect x="544" y="370" width="6" height="55" fill="#1e293b"/>

  <!-- Empty desk surface - just a blank exam paper -->
  <rect x="260" y="330" width="180" height="28" rx="4" fill="#111836" stroke="#334155" stroke-width="1"/>
  <rect x="270" y="336" width="80" height="4" rx="1" fill="#94a3b8" opacity="0.15"/>
  <rect x="270" y="344" width="120" height="4" rx="1" fill="#94a3b8" opacity="0.1"/>

  <!-- HALLUCINATION thought bubble (prominent) -->
  <ellipse cx="540" cy="180" rx="155" ry="55" fill="#111836" stroke="#ef4444" stroke-width="2" filter="url(#redGlow)"/>
  <circle cx="465" cy="240" r="10" fill="#111836" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="440" cy="260" r="6" fill="#111836" stroke="#ef4444" stroke-width="1.5"/>
  <text x="540" y="175" font-size="28" fill="#ef4444" text-anchor="middle" dominant-baseline="middle" font-weight="800">HALLUCINATION</text>
  <text x="540" y="202" font-size="16" fill="#94a3b8" text-anchor="middle" dominant-baseline="middle">confident but wrong</text>

  <!-- Floating question marks -->
  <text x="200" y="190" font-size="28" fill="#ef4444" opacity="0.3" font-weight="700">?</text>
  <text x="160" y="260" font-size="22" fill="#ef4444" opacity="0.2" font-weight="700">?</text>
  <text x="230" y="150" font-size="18" fill="#ef4444" opacity="0.25" font-weight="700">?</text>

  <!-- Output exam with errors -->
  <rect x="195" y="445" width="340" height="150" rx="8" fill="#111836" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
  <text x="215" y="470" font-size="18" fill="#ef4444" text-anchor="start" dominant-baseline="middle" font-weight="600">EXAM ANSWER:</text>
  <rect x="215" y="488" width="200" height="8" rx="2" fill="#94a3b8" opacity="0.2"/>
  <text x="500" y="492" font-size="20" fill="#ef4444" text-anchor="middle" dominant-baseline="middle" font-weight="700">&#x2717;</text>
  <rect x="215" y="508" width="260" height="8" rx="2" fill="#94a3b8" opacity="0.15"/>
  <text x="500" y="512" font-size="20" fill="#ef4444" text-anchor="middle" dominant-baseline="middle" font-weight="700">&#x2717;</text>
  <rect x="215" y="528" width="170" height="8" rx="2" fill="#94a3b8" opacity="0.2"/>
  <text x="500" y="532" font-size="20" fill="#ef4444" text-anchor="middle" dominant-baseline="middle" font-weight="700">&#x2717;</text>
  <rect x="215" y="548" width="230" height="8" rx="2" fill="#94a3b8" opacity="0.12"/>
  <text x="500" y="552" font-size="20" fill="#ef4444" text-anchor="middle" dominant-baseline="middle" font-weight="700">&#x2717;</text>
  <rect x="380" y="570" width="148" height="22" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="454" y="581" font-size="14" fill="#ef4444" text-anchor="middle" dominant-baseline="middle" font-weight="700">NO CITATIONS</text>

  <!-- Bullet points -->
  <circle cx="200" cy="650" r="5" fill="#ef4444" opacity="0.6"/>
  <text x="218" y="650" font-size="24" fill="#94a3b8" text-anchor="start" dominant-baseline="middle">No source material</text>
  <circle cx="200" cy="696" r="5" fill="#ef4444" opacity="0.6"/>
  <text x="218" y="696" font-size="24" fill="#94a3b8" text-anchor="start" dominant-baseline="middle">Makes up plausible facts</text>
  <circle cx="200" cy="742" r="5" fill="#ef4444" opacity="0.6"/>
  <text x="218" y="742" font-size="24" fill="#94a3b8" text-anchor="start" dominant-baseline="middle">Cannot verify any claims</text>
  <circle cx="200" cy="788" r="5" fill="#ef4444" opacity="0.6"/>
  <text x="218" y="788" font-size="24" fill="#94a3b8" text-anchor="start" dominant-baseline="middle">Hallucination risk: HIGH</text>

  <!-- ====== CENTER DIVIDER ====== -->
  <rect x="794" y="72" width="12" height="810" rx="6" fill="url(#dividerGrad)" opacity="0.6"/>
  <circle cx="800" cy="475" r="22" fill="#0a0e27" stroke="#8b5cf6" stroke-width="2"/>
  <text x="800" y="476" font-size="16" fill="#8b5cf6" text-anchor="middle" dominant-baseline="middle" font-weight="700">VS</text>

  <!-- ====== RIGHT SIDE: With RAG ====== -->
  <rect x="810" y="65" width="790" height="835" fill="url(#greenAtmos)"/>
  <text x="1210" y="98" font-size="36" fill="#22c55e" text-anchor="middle" dominant-baseline="middle" font-weight="700">With RAG</text>

  <!-- Right student figure (upright, confident) -->
  <!-- Head (upright) -->
  <circle cx="1170" cy="200" r="32" fill="#334155" stroke="#f1f5f9" stroke-width="2.5"/>
  <!-- Eyes (confident) -->
  <circle cx="1160" cy="195" r="3" fill="#f1f5f9"/>
  <circle cx="1182" cy="195" r="3" fill="#f1f5f9"/>
  <!-- Confident smile -->
  <path d="M 1158,213 Q 1170,222 1182,213" fill="none" stroke="#f1f5f9" stroke-width="2"/>

  <!-- Body (upright torso) -->
  <path d="M 1140,232 L 1135,310 L 1135,360 L 1205,360 L 1205,310 L 1200,232" fill="#334155" stroke="#f1f5f9" stroke-width="2"/>
  <!-- Arms on desk (active, writing) -->
  <path d="M 1135,300 Q 1105,330 1070,350" fill="none" stroke="#f1f5f9" stroke-width="6" stroke-linecap="round"/>
  <path d="M 1205,300 Q 1235,330 1275,350" fill="none" stroke="#f1f5f9" stroke-width="6" stroke-linecap="round"/>
  <!-- Pen in right hand -->
  <line x1="1275" y1="347" x2="1300" y2="332" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>

  <!-- Desk -->
  <rect x="990" y="358" width="390" height="12" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="1010" y="370" width="6" height="55" fill="#1e293b"/>
  <rect x="1364" y="370" width="6" height="55" fill="#1e293b"/>

  <!-- Books/chunks stacked on desk (left side of desk) -->
  <rect x="1000" y="322" width="100" height="36" rx="4" fill="#2563eb" opacity="0.75" stroke="#3b82f6" stroke-width="1"/>
  <text x="1050" y="342" font-size="14" fill="#fff" text-anchor="middle" dominant-baseline="middle" font-weight="600">chunk_42</text>
  <rect x="1005" y="288" width="90" height="34" rx="4" fill="#0d9488" opacity="0.75" stroke="#14b8a6" stroke-width="1"/>
  <text x="1050" y="307" font-size="14" fill="#fff" text-anchor="middle" dominant-baseline="middle" font-weight="600">chunk_17</text>
  <rect x="1010" y="258" width="80" height="30" rx="4" fill="#8b5cf6" opacity="0.75" stroke="#a78bfa" stroke-width="1"/>
  <text x="1050" y="274" font-size="14" fill="#fff" text-anchor="middle" dominant-baseline="middle" font-weight="600">chunk_08</text>

  <!-- Open book on desk (right side) -->
  <path d="M 1280,330 L 1280,358 L 1360,358 L 1360,330 Q 1320,322 1280,330" fill="#111836" stroke="#06b6d4" stroke-width="1.5"/>
  <line x1="1320" y1="325" x2="1320" y2="358" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <rect x="1288" y="336" width="25" height="3" rx="1" fill="#06b6d4" opacity="0.3"/>
  <rect x="1288" y="344" width="20" height="3" rx="1" fill="#06b6d4" opacity="0.2"/>
  <rect x="1330" y="336" width="22" height="3" rx="1" fill="#06b6d4" opacity="0.3"/>
  <rect x="1330" y="344" width="18" height="3" rx="1" fill="#06b6d4" opacity="0.2"/>

  <!-- Connection lines from chunks to student (knowledge flowing) -->
  <line x1="1100" y1="310" x2="1135" y2="270" stroke="#2563eb" stroke-width="1.5" opacity="0.35" stroke-dasharray="4,3"/>
  <line x1="1095" y1="295" x2="1135" y2="260" stroke="#0d9488" stroke-width="1.5" opacity="0.35" stroke-dasharray="4,3"/>
  <line x1="1090" y1="273" x2="1135" y2="250" stroke="#8b5cf6" stroke-width="1.5" opacity="0.35" stroke-dasharray="4,3"/>

  <!-- Confident thought bubble -->
  <ellipse cx="1370" cy="180" rx="140" ry="50" fill="#111836" stroke="#22c55e" stroke-width="2" filter="url(#greenGlow)"/>
  <circle cx="1280" cy="235" r="10" fill="#111836" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="1255" cy="252" r="6" fill="#111836" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1370" y="172" font-size="26" fill="#22c55e" text-anchor="middle" dominant-baseline="middle" font-weight="700">Cited answer!</text>
  <text x="1370" y="198" font-size="16" fill="#94a3b8" text-anchor="middle" dominant-baseline="middle">grounded in sources</text>

  <!-- Output exam with citations -->
  <rect x="1015" y="445" width="350" height="150" rx="8" fill="#111836" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  <text x="1035" y="470" font-size="18" fill="#22c55e" text-anchor="start" dominant-baseline="middle" font-weight="600">EXAM ANSWER:</text>
  <rect x="1035" y="488" width="200" height="8" rx="2" fill="#f1f5f9" opacity="0.25"/>
  <rect x="1247" y="484" width="26" height="16" rx="3" fill="#2563eb" opacity="0.5"/>
  <text x="1260" y="492" font-size="11" fill="#fff" text-anchor="middle" dominant-baseline="middle" font-weight="700">[1]</text>
  <text x="1320" y="492" font-size="20" fill="#22c55e" text-anchor="middle" dominant-baseline="middle" font-weight="700">&#x2713;</text>
  <rect x="1035" y="508" width="260" height="8" rx="2" fill="#f1f5f9" opacity="0.2"/>
  <rect x="1307" y="504" width="26" height="16" rx="3" fill="#0d9488" opacity="0.5"/>
  <text x="1320" y="512" font-size="11" fill="#fff" text-anchor="middle" dominant-baseline="middle" font-weight="700">[2]</text>
  <text x="1340" y="512" font-size="20" fill="#22c55e" text-anchor="middle" dominant-baseline="middle" font-weight="700">&#x2713;</text>
  <rect x="1035" y="528" width="170" height="8" rx="2" fill="#f1f5f9" opacity="0.25"/>
  <rect x="1217" y="524" width="26" height="16" rx="3" fill="#8b5cf6" opacity="0.5"/>
  <text x="1230" y="532" font-size="11" fill="#fff" text-anchor="middle" dominant-baseline="middle" font-weight="700">[3]</text>
  <text x="1320" y="532" font-size="20" fill="#22c55e" text-anchor="middle" dominant-baseline="middle" font-weight="700">&#x2713;</text>
  <rect x="1035" y="548" width="230" height="8" rx="2" fill="#f1f5f9" opacity="0.18"/>
  <rect x="1277" y="544" width="26" height="16" rx="3" fill="#2563eb" opacity="0.5"/>
  <text x="1290" y="552" font-size="11" fill="#fff" text-anchor="middle" dominant-baseline="middle" font-weight="700">[1]</text>
  <text x="1320" y="552" font-size="20" fill="#22c55e" text-anchor="middle" dominant-baseline="middle" font-weight="700">&#x2713;</text>
  <rect x="1220" y="570" width="138" height="22" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="1289" y="581" font-size="14" fill="#22c55e" text-anchor="middle" dominant-baseline="middle" font-weight="700">FULLY CITED</text>

  <!-- Bullet points -->
  <circle cx="1020" cy="650" r="5" fill="#22c55e" opacity="0.6"/>
  <text x="1038" y="650" font-size="24" fill="#f1f5f9" text-anchor="start" dominant-baseline="middle">Retrieves real sources</text>
  <circle cx="1020" cy="696" r="5" fill="#22c55e" opacity="0.6"/>
  <text x="1038" y="696" font-size="24" fill="#f1f5f9" text-anchor="start" dominant-baseline="middle">Grounds response in facts</text>
  <circle cx="1020" cy="742" r="5" fill="#22c55e" opacity="0.6"/>
  <text x="1038" y="742" font-size="24" fill="#f1f5f9" text-anchor="start" dominant-baseline="middle">Cites where info came from</text>
  <circle cx="1020" cy="788" r="5" fill="#22c55e" opacity="0.6"/>
  <text x="1038" y="788" font-size="24" fill="#f1f5f9" text-anchor="start" dominant-baseline="middle">Hallucination risk: LOW</text>

  <!-- Bottom accent -->
  <rect x="100" y="850" width="1400" height="2" rx="1" fill="#334155" opacity="0.4"/>
</svg>
